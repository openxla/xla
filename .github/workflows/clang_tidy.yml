name: Clang Tidy
permissions:
  contents: read
on:
  pull_request:
jobs:
  clang-tidy:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - name: "Checking out repository"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: '0'
          persist-credentials: false
      - name: "Update main branch"
        run: git fetch origin main --depth=1
      - name: "Install bazelisk"
        run: go install github.com/bazelbuild/bazelisk@24651ab # v1.20.0
      - name: "Run Clang Tidy"
        run: |
          set -euo pipefail
          # Set BUILD_WORKSPACE_DIRECTORY to satisfy the script's check if run directly
          export BUILD_WORKSPACE_DIRECTORY=$PWD
          bazelisk run //build_tools/ci:run_clang_tidy
