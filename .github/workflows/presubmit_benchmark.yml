# .github/workflows/presubmit_benchmarks.yml
name: Presubmit - Run Benchmarks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      benchmark_filter:
        description: "Regex to filter by benchmark name (e.g., 'gemma.*')."
        required: false
        type: string
        default: ""
      environment_filter:
        description: "Regex to filter by environment configuration ID (e.g., 'gpu_l4')."
        required: false
        type: string
        default: ""
      custom_metadata:
        description: "JSON string of custom metadata to append to benchmark results."
        required: false
        type: string
        default: "{}"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  run_benchmarks:
    name: Run XLA presubmit benchmarks
    uses: google-ml-infra/bap/.github/workflows/run-benchmarks.yaml@5e7e2940d64323c7f6d88b04c120477b1fbf8310
    with:
      registry_file: "xla/tools/benchmarks/benchmark_registry.pbtxt"
      tag_filter: "presubmit"
      benchmark_filter: ${{ inputs.benchmark_filter || '' }}
      environment_filter: ${{ inputs.environment_filter || '' }}
      custom_metadata: ${{ inputs.custom_metadata || '{}' }}
      ab_mode: false
      post_pr_comment: ${{ github.event_name == 'pull_request' }}
      publish_metrics: false
      bap_ref: "5e7e2940d64323c7f6d88b04c120477b1fbf8310"
