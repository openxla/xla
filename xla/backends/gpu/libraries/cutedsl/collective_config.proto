syntax = "proto3";

package xla.gpu.cutedsl.proto;

import "xla/xla_data.proto";

enum PeerRegionEndpointProto {
  PEER_REGION_ENDPOINT_PROTO_ARGUMENT = 0;
  PEER_REGION_ENDPOINT_PROTO_RESULT = 1;
}

enum PeerMemoryKindProto {
  PEER_MEMORY_KIND_PROTO_SYMMETRIC = 0;
}

enum CollectiveStepKindProto {
  COLLECTIVE_STEP_KIND_PROTO_BARRIER = 0;
  COLLECTIVE_STEP_KIND_PROTO_LAUNCH = 1;
}

message PeerRegionProto {
  optional PeerRegionEndpointProto endpoint = 1;
  optional int64 buffer_index = 2;
  optional int64 byte_offset = 3;
  optional int64 byte_size = 4;
  optional int64 required_alignment = 5;
  optional PeerMemoryKindProto memory_kind = 6;
}

message CollectiveStepProto {
  optional CollectiveStepKindProto kind = 1;
  optional int64 operand = 2;
}

message CollectiveCallConfigV3 {
  optional int64 abi_clique_size = 1;
  optional .xla.CollectiveOpGroupMode group_mode = 2;
  optional int64 communication_id = 3;
  repeated .xla.ReplicaGroup replica_groups = 4;
  optional bytes module = 5;
  repeated PeerRegionProto peer_regions = 6;
  repeated CollectiveStepProto steps = 7;
}
